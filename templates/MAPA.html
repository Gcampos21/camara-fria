<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Mapa da Câmara</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.posicao{
height:120px;
border:1px solid #ccc;
border-radius:10px;
padding:8px;
background:white;
font-size:14px;
}

</style>

</head>

<body class="bg-light">

<div class="container mt-4">

<h3 class="mb-4">Mapa da Câmara Fria</h3>

<div class="row g-3">

{% for endereco, info in posicoes.items() %}

<div class="col-3">

<div class="posicao">

<b>{{ endereco }}</b><br>

{{ info.produto }}<br>

Qtd: {{ info.qtd }}<br>

Val: {{ info.validade }}

</div>

</div>

{% endfor %}

</div>

<a href="/" class="btn btn-secondary mt-4">Voltar</a>

</div>

</body>

</html>
