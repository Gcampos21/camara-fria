<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Câmara Fria</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h3 class="mb-4">Movimentação de Estoque</h3>

<div class="card shadow p-4">

<form action="/movimentar" method="post">

<div class="mb-3">
<label>Tipo</label>
<select name="tipo" class="form-control">
<option>Entrada</option>
<option>Saída</option>
</select>
</div>

<div class="mb-3">
<label>Código</label>
<input id="codigo" name="codigo" class="form-control" autocomplete="off">
</div>

<div class="mb-3">
<label>Produto</label>
<input id="produto" class="form-control" readonly>
</div>

<div class="mb-3">
<label>Estoque atual</label>
<input id="estoque" class="form-control" readonly>
</div>

<div class="mb-3">
<label>Quantidade</label>
<input name="quantidade" class="form-control">
</div>

<hr>

<h5>Endereço (somente entrada)</h5>

<div class="mb-3">
<label>Setor</label>
<select name="setor" class="form-control">
<option>RESF</option>
<option>CONG</option>
</select>
</div>

<div class="row">

<div class="col">
<label>Rua</label>
<input name="rua" class="form-control">
</div>

<div class="col">
<label>Posição</label>
<input name="posicao" class="form-control">
</div>

<div class="col">
<label>Andar</label>
<input name="andar" class="form-control">
</div>

</div>

<br>

<div class="mb-3">
<label>Validade</label>
<input name="validade" class="form-control">
</div>

<button class="btn btn-success w-100">
Registrar movimentação
</button>

</form>


<a href="/mapa" class="btn btn-primary mt-3 w-100">
Mapa da Câmara
</a>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const campoCodigo = document.getElementById("codigo")
    const campoProduto = document.getElementById("produto")
    const campoEstoque = document.getElementById("estoque")

    campoCodigo.addEventListener("input", function(){

        const codigo = campoCodigo.value.trim()

        if(codigo === ""){
            campoProduto.value = ""
            campoEstoque.value = ""
            return
        }

        fetch("/produto/" + codigo)

        .then(res => res.json())

        .then(data => {

            campoProduto.value = data.produto || ""
            campoEstoque.value = data.estoque || 0

        })

        .catch(err => {

            console.error("Erro na busca:", err)

        })

    })

})

</script>

</body>
</html>
